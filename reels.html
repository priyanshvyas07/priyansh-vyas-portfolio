       Displays additional reels in batches

  ========================= -->

target="_blank"

       class="btn">

  </div>

</section>




<script>

/* ==================================================

   Stores reel cover images and their Instagram links
================================================== */

  const reels = [

    { img: "assets/images/reels/reel-08.jpg", link: "https://www.instagram.com/haryanvisongs.hits/reel/DTaf4ksiIEF/" },
    { img: "assets/images/reels/reel-09.jpg", link: "https://www.instagram.com/haryanvisongs.hits/reel/DTVYCt2klbO/" },
    { img: "assets/images/reels/reel-10.jpg", link: "https://www.instagram.com/haryanvisongs.hits/reel/DTAv-fuCFrE/" },

    { img: "assets/images/reels/reel-11.jpg", link: "https://www.instagram.com/haryanvisongs.hits/reel/DTQOhrTEpMe/" },
    { img: "assets/images/reels/reel-12.jpg", link: "https://www.instagram.com/haryanvisongs.hits/reel/DTIim-nEjJv/" },
    { img: "assets/images/reels/reel-13.jpg", link: "https://www.instagram.com/haryanvisongs.hits/reel/DThifqsiFJ0/" },
    { img: "assets/images/reels/reel-14.jpg", link: "https://www.instagram.com/haryanvisongs.hits/reel/DTnXWuIkosP/" },
    { img: "assets/images/reels/reel-15.jpg", link: "https://www.instagram.com/haryanvisongs.hits/reel/DTsk3s9iNfn/" },

    { img: "assets/images/reels/reel-16.jpg", link: "https://www.instagram.com/haryanvisongs.hits/reel/DTxqkKhEmUm/" },

    { img: "assets/images/reels/reel-20.jpg", link: "https://www.instagram.com/haryanvisongs.hits/reel/DUBNKi0COCg/" }

  ];



/* ==================================================
   DOM ELEMENT REFERENCES
================================================== */

  const grid = document.getElementById("reelsGrid");
  const loadMoreBtn = document.getElementById("loadMore");
  const viewAll = document.getElementById("viewAll");



/* ==================================================
   PAGINATION CONFIGURATION
================================================== */

  let visible = 0;   // Tracks currently visible reels
  const STEP = 10;   // Number of reels per load



/* ==================================================
   RENDER FUNCTION
   Dynamically injects reels into the grid
================================================== */

  function renderReels() {

    const next = reels.slice(visible, visible + STEP);

    next.forEach(reel => {

      const a = document.createElement("a");
      a.href = reel.link;
      a.target = "_blank";
      a.className = "reel-card";

      a.innerHTML = `

        <img
          src="${reel.img}"
          alt="Instagram Reel Cover created by Priyansh Vyas"
          loading="lazy">

        <span class="play">▶</span>
      `;

      grid.appendChild(a);
    });

    visible += STEP;

    // Hide button when all reels are loaded
    if (visible >= reels.length) {
      loadMoreBtn.style.display = "none";
      viewAll.style.display = "block";
    }
  }



/* Initial Render */
renderReels();

/* Load More Click Event */
loadMoreBtn.addEventListener("click", renderReels);

</script>
